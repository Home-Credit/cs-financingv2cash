        following data:

        - type of customer

        - the amount the customer wants to borrow

        - financed subject

        - method of financing


        The partner may choose product set from which the products will be calculated. If none is provided, the default product set for the selected financing method is used.

        If the customer has already chosen the product or the amount of the installment that he would like to repay, he can also state that in reqeust.


        The response returns a collection of products that meet the input, for each product returns the amount of the credit amount, a set of financial parameters (minimum installment, interest rate, etc.) and for variable products several examples of repayment with different installments.


        One product is labeled as favourite product which is the most suitable for the customer.


