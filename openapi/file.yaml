      type: object
      properties:
        firstName:
          type: string
          example: John
          description: Customer first (given) name. Name SHOULD follow regular expression
            `^[A-ZÁ-Ž]'?[- \u00A0a-zA-Zá-žÁ-Ž]*[a-zA-Zá-žÁ-Ž]$`, SHOULD be 2 to
            30 characters long and characters SHOULD be in the `ISO 8859-2`
            character set.
        lastName:
          type: string
          example: Newborn
          description: Customer last (family) name. Name SHOULD follow regular expression
            `^[A-ZÁ-Ž]'?[- \u00A0a-zA-Zá-žÁ-Ž]*[a-zA-Zá-žÁ-Ž]$`,SHOULD be 2 to
            30 characters long and characters SHOULD be in the `ISO 8859-2`
            character set.
        fullName:
          type: string
          example: Ing. John Newborn, Csc.
          description: Customer full name, including academical degrees and salutation.
            Attribute `fullName` is parsed (and eventually shortened) into
            `firstName` and `lastName`; `fullName` is never returned in
            response. In case all three attributes are provided, `fullName` is
            discarded. Full name SHOULD be no longer than 100 characters and
            characters SHOULD be in the `ISO 8859-2` character set
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationContact"
          description: Contacts of person.
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
          description: Addresses.
        identificationNumber:
          type: string
          example: 890619/5723
          description: Customer's identification number (actually birth number). SHOULD be
            valid according to the legislation currently in effect. Customer
            MUST be at least 18 years old.
