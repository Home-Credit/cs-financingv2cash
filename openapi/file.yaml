          type: string
          example: 172.10.10.1
          description: IPv4 or IPv6 address of a customer.
        fingerprintComponents:
          $ref: "#/components/schemas/KeyValue"
    Address:
      type: object
      properties:
        city:
          type: string
          example: Prague
          description: City. String values longer than 100 characters will be shortened to
            100 characters.
        streetAddress:
          type: string
          example: Letenská
          description: Street/city part. String values longer than 100 characters will be
            shortened to 100 characters.
        streetNumber:
          type: string
          example: "22"
          description: Street number. String values longer than 50 characters will be
            shortened to 50 characters.
        zip:
          type: string
          example: 140 00
          description: Postal code. String values longer than 10 characters will be
            shortened to 10 characters.
        flags:
          type: array
          items:
            $ref: "#/components/schemas/AddressFlag"
          description: Types of the address.
    AddressFlag:
      type: string
      enum:
        - PERMANENT
        - CONTACT
    ApplicationContact:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - EMAIL
            - MOBILE
            - PHONE
          description: Contact type
        email:
          $ref: "#/components/schemas/Email"
        mobile:
          $ref: "#/components/schemas/Phone"
        phone:
          $ref: "#/components/schemas/Phone"
    Email:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          example: john.newborn@country.com
          description: E-mail address of customer. MUST be valid email according to [RFC
            2822](https://tools.ietf.org/html/rfc2822).
    Phone:
      type: object
      required:
        - value
      properties:
        countryCode:
          type: string
          example: "+420"
          description: MUST be valid countryCode.
        value:
          type: string
          example: "777123456"
          description: Mobile phone number SHOULD be 9 characters long. The mobile phone
            number itself without country code SHOULD begin with digit `6` or
            `7` (for CZ) or with `9x` where `x` is different from `6` (for SK).
    Company:
      type: object
      properties:
        businessName:
          type: string
          example: Planeta s.r.o.
          description: Name of business company.
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
          description: Addresses.
        "'businessIdentificationNumber'":
          type: string
          example: "123456854"
          description: Company's identification number (known as IČO).
        ipAddress:
          type: string
          example: 172.10.10.1
          description: IPv4 or IPv6 address of a customer.
        fingerprintComponents:
          $ref: "#/components/schemas/KeyValue"
    FinancedSubjectBase:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - CASH
            - LIABILITY
          description: Financed subject type
        cash:
          $ref: "#/components/schemas/CashBase"
        liability:
          $ref: "#/components/schemas/LiabilityBase"
    CashBase:
      type: object
      required:
        - financing
      properties:
        amount:
          $ref: "#/components/schemas/Amount"
        financing:
          $ref: "#/components/schemas/CashFinancing"
    CashFinancing:
      type: object
      required:
        - type
        - loanWallet
      properties:
        type:
          type: string
          enum:
            - LOAN_WALLET
          description: Financing type suitable for `CASH` application.
        loanWallet:
          $ref: "#/components/schemas/SettingsLoanWallet"
    SettingsLoanWallet:
      type: object
      properties:
        preferredInstallment:
          $ref: "#/components/schemas/Amount"
        productSetCode:
          type: string
          example: COCONL
          description: Product set code. If chosen product is not from default product set
            it is RECOMMENDED to provide code of its product set.  Invalid
            product set is discarded.
        productCode:
          type: string
          example: COCONL06
          description: >-
            Product code (obtained from calculation result).


            SHOULD be valid in combination with attributes `cash.amount` and `preferredInstallment`. Invalid product is discarded and the customer will choose the correct product after redirection to Home Credit's front-end application; examples of invalid settings: the product does not exist or does not support the requested credit amount.
    LiabilityBase:
      type: object
      required:
        - financing
      properties:
        amount:
          $ref: "#/components/schemas/Amount"
        financing:
          $ref: "#/components/schemas/LiabilityFinancing"
    LiabilityFinancing:
      type: object
      required:
        - type
        - consolidation
      properties:
        type:
          type: string
          enum:
            - CONSOLIDATION
          description: Financing type suitable for `LIABILITY` application.
        consolidation:
          $ref: "#/components/schemas/ConsolidationSettings"
    ConsolidationSettings:
      type: object
      properties:
        installment:
          $ref: "#/components/schemas/Amount"
        productSetCode:
          type: string
          example: COCONL
          description: Product set code. If chosen product is not from default product set
            it is RECOMMENDED to provide code of its product set.  Invalid
            product set is discarded.
        productCode:
          type: string
          example: COCONL06
          description: >-
            Product code (obtained from calculation result).


            SHOULD be valid in combination with attributes `liability.amount` and `installment`. Invalid product is discarded and the customer will choose the correct product after redirection to Home Credit's front-end application; examples of invalid settings: the product does not exist or does not fit with the installment amount.
    FinancingOriginationContext:
      type: object
      required:
        - channel
      properties:
        channel:
          $ref: "#/components/schemas/OriginationChannel"
        precheckIds:
          type: array
          items:
            type: string
          description: Array of all precheck ids related to this application. If partner
            has run Precheck operation with this Customer's data he SHOULD
            provide precheckId into this attribute. SHOULD be valid precheckId.
            See Precheck operations and their's response.
        sourceId:
          type: string
          example: Cash_10_2020
          description: Identifier of source or campaign of lead origin. Partner SHOULD
            provide valid `sourceId`
        extendedData:
          type: array
          items:
            $ref: "#/components/schemas/KeyValue"
          description: "Additional data about application origin. List of supported `keys`
            for `extendedData`: `utm_source`, `utm_medium`, `utm_campaign`,
            `utm_term`, `utm_content`, `gclid`, `fbclid`, `url`."
    OriginationChannel:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - ONLINE
            - PHONE
          description: Type of origination channel
        online:
          $ref: "#/components/schemas/MerchantURLs"
        phone:
          $ref: "#/components/schemas/PhoneSettings"
    MerchantURLs:
      type: object
      properties:
        approvedRedirect:
          type: string
          example: https://www.partnereshop.cz
          description: URL of the partner used for redirection of the customer back to
            partner website after the application approval. MUST be a valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986). URL
            SHOULD contain scheme (for example `https://`) otherwise some
            browsers will not redirect customer correctly.  MUST NOT be longer
            than 1000 characters.
        rejectedRedirect:
          type: string
          example: https://www.partnereshop.cz/kosik
          description: URL of the partner used for redirection of the customer back to
            partner website after application rejection. MUST be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986). URL
            SHOULD contain scheme (for example `https://`) otherwise some
            browsers will not redirect customer correctly. MUST NOT be longer
            than 1000 characters.
        notificationEndpoint:
          type: string
          example: https://www.partnereshop.cz/order/AA234
          description: URL of the partner used as a notification endpoint for notifying
            partner about important updates in the application process
            (approval, rejection, cancellation, etc.). MUST be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986). URL
            SHOULD contain scheme (for example `https://`). MUST NOT be longer
            than 1000 characters.
    PhoneSettings:
      type: object
      properties:
        callRequest:
          $ref: "#/components/schemas/CallRequest"
        notificationEndpoint:
          type: string
          example: https://www.partnereshop.cz/order/AA234
          description: URL of the partner used as a notification endpoint for notifying
            partner about important updates in the application process
            (approval, rejection, cancellation, etc.). MUST be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986). URL
            SHOULD contain scheme (for example `https://`). MUST NOT be longer
            than 1000 characters.
    CallRequest:
      type: object
      required:
        - type
        - dates
      properties:
        type:
          type: string
          enum:
            - DATES
        dates:
          type: array
          items:
            type: string
          description: The date (or dates) and time customer wants the operator to call
    ApplicationBase:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          example: 123e4567-e89b-12d3-a456-426655440000
          description: Primary identifier of the application
        status:
          type: string
          enum:
            - CREATED
            - PRESCORED
            - APPROVED
            - VERIFICATION
            - ALTERNATIVE
            - CONFIRMED
            - REJECTED
            - CANCELLED
          description: Application status
        workflowSteps:
          type: array
          items:
            $ref: "#/components/schemas/FinancingWorkflowStep"
          description: Collection of currently available application process actions.
    FinancingWorkflowStep:
      type: object
      required:
        - code
        - priority
        - mandatory
      properties:
        code:
          type: string
          enum:
            - REDIRECT
          description: Workflow code
        priority:
          type: number
          example: 1
          description: Identifier of workflow step's priority expressed as number (lowest
            number means highest priority)
        mandatory:
          type: boolean
          example: true
          description: Available workflow step for current application in application
            process.
        redirect:
          $ref: "#/components/schemas/RedirectURL"
    RedirectURL:
      type: object
      required:
        - gatewayRedirectUrl
      properties:
        gatewayRedirectUrl:
          type: string
          example: https://pujcka.homecredit.cz
          description: Gateway redirect URL. Partner SHOULD redirect the customer to this
            address for the continuation of the application approval process.
    CalculateOffersRequest:
      type: object
      required:
        - customer
        - financedSubject
      properties:
        customer:
          $ref: "#/components/schemas/FinancingApplicationCustomerBase"
        financedSubject:
          $ref: "#/components/schemas/FinancedSubjectCalculateOffers"
    FinancedSubjectCalculateOffers:
      type: object
      required:
        - type
        - cash
        - liability
      properties:
        type:
          type: string
          enum:
            - CASH
            - LIABILITY
          description: Financed subject type
        cash:
          $ref: "#/components/schemas/CashCalculateOffers"
        liability:
          $ref: "#/components/schemas/LiabilityCalculateOffers"
    CashCalculateOffers:
      type: object
      required:
        - financing
      properties:
        amount:
          $ref: "#/components/schemas/Amount"
        financing:
          $ref: "#/components/schemas/CashFinancing"
    LiabilityCalculateOffers:
      type: object
      required:
        - financing
      properties:
        amount:
          $ref: "#/components/schemas/Amount"
        financing:
          $ref: "#/components/schemas/LiabilityFinancingCalculateOffers"
    LiabilityFinancingCalculateOffers:
      type: object
      required:
        - type
        - consolidation
      properties:
        type:
          type: string
          enum:
            - CONSOLIDATION
          description: Financing type suitable for `LIABILITY` application.
        consolidation:
          $ref: "#/components/schemas/SettingsConsolidationCalculateOffers"
    SettingsConsolidationCalculateOffers:
      type: object
      properties:
        productSetCode:
          type: string
          example: COCONL
          description: Product set code. If not provided, default product set is used.
        productCode:
          type: string
          example: COCONL06
          description: Product code
    CalculateOffersResponse:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - LOAN_WALLET
            - LIABILITY
          description: Financing type suitable for CASH application.
        loanWallet:
          $ref: "#/components/schemas/LoanWalletOffer"
        liability:
          $ref: "#/components/schemas/ProductOffer"
    ProductOffer:
      type: object
      required:
        - productCode
        - creditAmount
        - calculation
      properties:
        productCode:
          type: string
          example: HCONLESHOP
          description: Product offer code
        creditAmount:
          $ref: "#/components/schemas/AvailableCreditAmount"
        calculation:
          $ref: "#/components/schemas/CalculationDetail"
        flags:
          type: array
          items:
            type: string
            enum:
              - FAVOURITE
          description: Additional characteristics of product offer code
    LoanWalletOffer:
      allOf:
        - $ref: "#/components/schemas/ProductOffer"
        - type: object
          properties:
            repaymentExamples:
              type: array
              items:
                $ref: "#/components/schemas/RepaymentExample"
              description: Examples of debt repayement for flexible product with variable end
                (with various installments)
    AvailableCreditAmount:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - FIXED
            - VARIABLE
          description: Credit amount can be fixed for particular amount or variable
        fixed:
          $ref: "#/components/schemas/Amount"
        variable:
          $ref: "#/components/schemas/VariableCreditAmount"
    VariableCreditAmount:
      type: object
      required:
        - minimum
        - maximum
      properties:
        minimum:
          $ref: "#/components/schemas/Amount"
        maximum:
          $ref: "#/components/schemas/Amount"
    CalculationDetail:
      type: object
      required:
        - installment
        - annualInterestRate
        - annualPercentageRate
        - numberOfInstallments
        - installmentFirstDate
        - installmentLastDate
        - predictedProvisionDate
        - amountToPay
        - installmentDay
        - maturityTextForm
        - legalLine
      properties:
        installment:
          $ref: "#/components/schemas/Amount"
        annualInterestRate:
          type: number
          example: 0.17
          description: Annual interest rate
        annualPercentageRate:
          type: string
          example: "0.23"
          description: Annual percentage rate of loan (so-called "RPSN"/"RPMN")
        numberOfInstallments:
          type: number
          example: 12
          description: Count of installments needed to repay purchased loan. Approximated
            for product offers with a variable end.
        installmentFirstDate:
          type: string
          example: 2021-03-20
          description: Date of first installment.
        installmentLastDate:
          type: string
          example: 2022-02-20
          description: Date of last installment. Approximated for product offers with a
            variable end.
        predictedProvisionDate:
          type: string
          description: Predicted date of sending fund to customer's account
        amountToPay:
          $ref: "#/components/schemas/Amount"
        installmentDay:
          type: number
          example: 20
          description: Day of installment
        maturityTextForm:
          type: string
          example: 3 roky a 8 měsíců
          description: Text representation of maturity
        legalLine:
          type: string
          example: "Ilustrativní výpočet dle zákona: Výše úvěru 10 000 Kč, roční úroková
            sazba 14,88 %, RPSN 15,9 %, celkem zaplatíte 10 806 Kč. Jednotlivé
            po sobě jdoucí měsíční splátky: 957 Kč, 947 Kč, 937 Kč, 926 Kč, 916
            Kč, 906 Kč, 895 Kč, 885 Kč, 875 Kč, 864 Kč, 854 Kč, 844 Kč. Splátky
            a částka, kterou celkem zaplatíte, jsou matematicky zaokrouhleny."
          description: Legal example of repayment
    RepaymentExample:
      type: object
      required:
        - installment
        - numberOfInstallments
        - amountToPay
        - maturityTextForm
      properties:
        installment:
          $ref: "#/components/schemas/Amount"
        numberOfInstallments:
          type: number
          example: 12
          description: Count of installments needed to repay purchased loan for chosen
            `installment` (approximated)
        amountToPay:
          $ref: "#/components/schemas/Amount"
        flags:
          type: array
          items:
            type: string
            enum:
              - FAVOURITE
          description: Additional characteristics of example repayment
        maturityTextForm:
          type: string
          example: 3 roky a 8 měsíců
          description: Text representation of maturity
    PrecheckRequest:
      type: object
      required:
        - customer
        - financedSubject
      properties:
        customer:
          allOf:
            - $ref: "#/components/schemas/FinancingApplicationCustomer"
            - type: object
              properties:
                firstName:
                  type: string
                  example: John
                  description: Customer first (given) name. String values longer than 100
                    characters will be shortened to 100 characters. One of
                    `firstName` and `fullName` is REQUIRED.
                lastName:
                  type: string
                  example: Newborn
                  description: Customer last (family) name. String values   longer than 100
                    characters will be shortened to 100 characters.  One of
                    `lastName` and `fullName` is REQUIRED.
          description: Customer data
        financedSubject:
          $ref: "#/components/schemas/PrecheckFinancedSubject"
    PrecheckFinancedSubject:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - CASH
            - LIABILITY
          description: Financed subject type
    PrecheckResult:
      type: object
      required:
        - recommendation
        - result
      properties:
        id:
          type: string
          example: "1234"
          description: Unique identifier of Precheck. Send this identificator in
            ApplicationRequest for a better approval rate. The Id is sometimes
            not provided (for example if precheck ends with a result `TIME_OUT`)
        recommendation:
          type: boolean
          description: |-
            A recommendation of whether the application should be created.

            true = Application is likely going to be approved.
            false = Application is likely going to be rejected.
        result:
          type: string
          enum:
            - NEW_CONTRACT
            - EXISTING_CONTRACT
            - TIME_OUT
            - UNKNOWN
          description: A detailed result of precheck.
        message:
          type: string
          example: V HCO peněžence nemáte dostatečný limit.
          description: Custom message for customers.
    GetApplicationsResults:
      type: object
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationResult"
          description: List of applications results
    ApplicationResult:
      type: object
      required:
        - id
        - createdDate
        - finished
      properties:
        id:
          type: string
          example: 123e4567-e89b-12d3-a456-426655440000
          description: Primary identifier of the application
        createdDate:
          type: string
          example: 2020-07-15T00:00:00+02:00
          description: Date of creation of application
        finished:
          type: boolean
          description: A flag indicating whether the application has already been
            completed or is still in progress.
        result:
          type: string
          enum:
            - SUCCESS
            - REJECTED
            - CANCELLED
          description: A detailed result of (only) finished application.
    NotificationRequest:
      type: object
      required:
        - notificationContent
        - sentDate
        - checksum
      properties:
        notificationContent:
          $ref: "#/components/schemas/NotificationContent"
        sentDate:
          type: string
          example: 2020-07-15T00:00:00+02:00
          description: Time when notification was sent (uses [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) formatting)
        checksum:
          type: string
          example: f61c69a259b702d564b2032e554984dec3b713ff7bdde17fcb727d403ea0d730816f46ad2bbc06a1914225d5dfba0396927dbf1b0698081814877b5486950a15
          description: Message checksum - result of HMAC with SHA512 (secret key is used)
    NotificationContent:
      type: object
      required:
        - applicationId
        - applicationStatus
        - notificationDate
        - sequenceNumber
      properties:
        applicationId:
          type: string
          example: 123e4567-e89b-12d3-a456-426655440000
          description: Primary identifier of the application
        applicationStatus:
          type: string
          enum:
            - CONFIRMED
            - CREATED
            - PRESCORED
            - APPROVED
            - VERIFICATION
            - ALTERNATIVE
            - REJECTED
            - CANCELLED
          description: Status of the application
        cashStatus:
          type: string
          enum:
            - PROCESSING
            - CANCELLED
            - TO_PAY
            - PAID
          description: Status of the Cash loan
        notificationDate:
          type: string
          example: 2020-07-15T00:00:00+02:00
          description: Time when notification was created (uses [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) formatting)
        sequenceNumber:
          type: number
          example: 1
          description: Notification sequence number
    Error:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          example: BAD_REQUEST
          description: Unique internal error code
        message:
          type: string
          example: Bad request
          description: Human readable error description (non-localized)
        severity:
          type: string
          enum:
            - ERROR
            - WARN
            - INFO
        attribute:
          type: string
          example: Client.addresses[1].streetNumber
          description: JSON path of request attribute that caused the error (if applicable)
        ticketId:
          type: string
          example: UAT1:AMS:20160516-091658.450:45e4
          description: Internal ticket ID, used for error backtracking
    Errors:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
          description: Array with errors
    Amount:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          example: 13300
          description: Amount in minor units (13300 represents 133) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217)
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
    File:
      type: object
      required:
        - filename
      properties:
        filename:
          type: string
          example: iphone6s.jpg
          description: File name.
    KeyValue:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          example: property
          description: Key
        value:
          type: string
          example: value
          description: Value
    BankAccount:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - IBAN
            - NATIONAL
          description: Account type
        iban:
          $ref: "#/components/schemas/AccountIBAN"
        national:
          $ref: "#/components/schemas/AccountNational"
    AccountIBAN:
      type: object
      required:
        - iban
      properties:
        iban:
          type: string
          example: CZ6508000000192000145399
          description: Account number in IBAN format
    AccountNational:
      type: object
      required:
        - accountNumber
        - bankCode
      properties:
        prefix:
          type: string
          example: "000000"
          description: Account number prefix. For domestic accounts, this will be
            specified in national format.
        accountNumber:
          type: string
          example: "1235335010"
          description: Account number. For domestic accounts, this will be specified in
            national format.
        bankCode:
          type: string
          example: "3030"
          description: For domestic accounts, bank code in national format
    PhoneNumber:
      type: object
      required:
        - number
      properties:
        number:
          type: string
          example: "+420123456789"
          description: Phone number (including country code)
    PartnerLogin:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: partner
          description: Partner username
        password:
          type: string
          example: partnerSecretPassword
          description: Partner secret password
    PartnerLoginResult:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          example: TokenForPartnerTokenForPartnerTokenForPartnerTokenForPartner
          description: Access token
        expiresIn:
          type: number
          example: 7200
          description: Token validity remaining time (in seconds)
    TokenCodeRequest:
      type: object
      required:
        - grant_type
        - client_id
        - client_secret
      properties:
        grant_type:
          type: string
          enum:
            - authorization_code
            - refresh_token
          description: Grant flow type, only `authorization_code` and `refresh_token` is
            supported
        client_id:
          type: string
          example: my_app_id
          description: "`client_id` parameter of partner's application, received at
            application registration"
        client_secret:
          type: string
          example: my_app_secret
          description: "`client_secret` parameter of partner's application, received at
            application registration"
    TokenResponse:
      type: object
      required:
        - token_type
        - access_token
        - expires_in
      properties:
        refresh_token:
          type: string
          example: 7dbadd74c434439db4fc9b2bbf8cabb3
          description: refresh token, if supported
        token_type:
          type: string
          example: bearer
